<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Awak 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://files.catbox.moe/is8ba0.png') no-repeat center/cover;
  overflow:hidden;
}

/* overlay tipis aja */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  top:0;
  left:0;
}

/* card TANPA BLUR */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:30px;
  max-width:350px;
  border-radius:20px;
  background:rgba(0,0,0,0.5); /* transparan tapi jelas */
  box-shadow:0 0 25px rgba(255,0,120,0.5);
  animation:fadeIn 1.5s ease;
}

h1{
  color:#ff6fa5;
  margin-bottom:15px;
}

p{
  color:#fff;
  font-size:14px;
  line-height:1.6;
  margin-bottom:20px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff1a66;
  transform:scale(1.1);
}

/* hati */
.heart{
  position:absolute;
  color:#ff4d88;
  animation:float 5s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.5);}
  100%{transform:translateY(-10vh) scale(1.5);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Maaf ya 💖</h1>
  <p id="text">
    mungkin saya banyak kekurangan…<br><br>
    tapi satu benda yang pasti,<br>
    saya sayang awak 💗<br><br>
    saya tak nak kehilangan awak<br>
    hanya sebab kesilapan saya 😔
  </p>

  <button onclick="ubahText()">Klik sini 💕</button>
</div>

<script>
function ubahText(){
  document.getElementById("text").innerHTML =
  "Saya betul-betul minta maaf... 🥺<br><br>" +
  "Awak sangat berharga untuk saya 💖<br><br>" +
  "Saya janji akan jadi lebih baik...<br>" +
  "asalkan awak jangan pergi 😭💕";
}

setInterval(()=>{
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"%";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove();},5000);
},300);
</script>

</body>
</html>
